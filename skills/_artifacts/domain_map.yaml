library:
  name: '@mwalkersigma/stagehand'
  version: '1.0.0'
  repository: ''
  description: >-
    A TypeScript CLI framework for orchestrating multi-stage, multi-step
    command processors with a fluent builder API, typed flags, error
    registries, compensation (rollback), and tasuku-powered terminal
    task rendering.
  primary_framework: framework-agnostic

domains:
  - name: App Setup & Configuration
    slug: app-setup
    description: >-
      Creating a CLI application, registering commands with typed flags,
      configuring themes and visual output, and wiring up the entry point.

  - name: Processor Authoring
    slug: processor-authoring
    description: >-
      Defining processors via the fluent builder chain — error registries,
      shared state, stages, steps, parallel execution, collapse behavior,
      and finalization.

  - name: Resilience & Recovery
    slug: resilience
    description: >-
      Compensation (rollback) strategies, step atomicity, effect
      declarations, and diagnosing what needs cleanup when a script fails
      at any point.

  - name: Migration
    slug: migration
    description: >-
      Converting existing imperative scripts (bash, shell) into structured
      Stagehand processors while preserving command fidelity.

skills:
  - name: Scaffold CLI App
    slug: scaffold-cli-app
    domain: app-setup
    description: >-
      Set up a new Stagehand CLI app from scratch: create a ScriptApp,
      register commands with typed flags via Commander, configure a theme,
      and wire up parseAsync().
    type: core
    covers:
      - ScriptApp constructor and fluent API
      - .command() with CommandDefinition
      - .meta() for header metadata
      - .theme() with ScriptTheme
      - .parse() / .parseAsync()
      - Commander Option and typed flag extraction
      - CommandProcessorFactoryApi and defineProcessor
    tasks:
      - Create a new CLI app with a named command
      - Add typed CLI flags (boolean, string, negatable)
      - Customize the theme colors, header style, and collapse level
      - Wire a processor to a command via the handler factory
    reference_candidates:
      - topic: ScriptTheme color and style properties
        reason: >-
          13 color functions plus headerStyle, stageStyle, stepStyle,
          and collapseLevel — each with distinct configuration
    failure_modes:
      - mistake: Forgetting to call parseAsync at entry point
        mechanism: >-
          The ScriptApp is constructed and commands are registered but
          nothing executes because parseAsync() or parse() is never
          called. No error is thrown — the process exits silently.
        wrong_pattern: |
          const app = new ScriptApp('my-cli')
            .command({ name: 'build', ... });
          // missing: await app.parseAsync()
        correct_pattern: |
          await new ScriptApp('my-cli')
            .command({ name: 'build', ... })
            .parseAsync();
        source: modules/classes/appScript.ts — parse/parseAsync methods
        priority: HIGH
        status: active

      - mistake: Using plain Commander instead of extra-typings
        mechanism: >-
          Importing Command from 'commander' instead of
          '@commander-js/extra-typings' loses type inference on flags.
          The code compiles but flags are typed as Record<string, unknown>
          instead of the specific option types, defeating Stagehand's
          type-safety guarantees.
        wrong_pattern: |
          import { Command } from 'commander';
        correct_pattern: |
          import { Command, Option } from '@commander-js/extra-typings';
        source: modules/types.ts — ExtractCommandOpts relies on extra-typings generics
        priority: CRITICAL
        status: active

      - mistake: Defining options inline instead of with addOption
        mechanism: >-
          Using Commander's .option() shorthand for complex options
          instead of .addOption(new Option(...)) can lose type narrowing
          for default values and negatable flags, producing unexpected
          flag types at runtime.
        wrong_pattern: |
          build: (cmd) => cmd.option('-d, --dry-run', 'Dry run')
        correct_pattern: |
          build: (cmd) => cmd.addOption(
            new Option('-d, --dry-run', 'Dry run').default(false, 'false')
          )
        source: examples/build.ts line 17-18
        priority: MEDIUM
        status: active

  - name: Define Processor
    slug: define-processor
    domain: processor-authoring
    description: >-
      Define a processor with the fluent builder chain: register errors,
      create shared state, add stages with sequential or parallel steps,
      set collapse levels, write the finalize handler, and build.
    type: core
    covers:
      - ProcessorBuilder fluent chain
      - .errors() with ErrorRegistryInput
      - .createShared() for shared state initialization
      - .stage() with StageBuilder callback
      - .step() with StepDefinition (id, title, effect, compensation, run)
      - .parallel() for concurrent step execution
      - .collapse() for stage/step-level collapse
      - .buildArtifact() for stage-level artifacts
      - .finalize() and .build()
      - when() guards for conditional step execution
      - ExecutionContext API (getStepArtifact, getStageArtifact, $, isDryRun)
      - StepRunResult { artifact } return shape
    tasks:
      - Create a processor with the fluent builder pattern
      - Add stages with sequential steps
      - Add a parallel stage with concurrent steps
      - Use when() guards to conditionally skip steps
      - Access step and stage artifacts in finalize
      - Configure collapse behavior per-stage
      - Use ctx.$() for shell commands with dry-run support
    subsystems:
      - name: Sequential execution
        package: '@mwalkersigma/stagehand'
        config_surface: Default mode — steps awaited one at a time inside stage callback
      - name: Parallel execution
        package: '@mwalkersigma/stagehand'
        config_surface: .parallel() on StageBuilder — steps fired without individual awaits
      - name: Collapse behavior
        package: '@mwalkersigma/stagehand'
        config_surface: >-
          .collapse('stage' | 'tasks' | 'none') — resolved per-stage
          with priority stage > runtime flag > theme default
    reference_candidates:
      - topic: StepEffectKind values and their semantics
        reason: >-
          5 distinct effect kinds (read, create, update, delete, external)
          each with different compensation implications
      - topic: ExecutionContext methods
        reason: >-
          12+ methods on ExecutionContext including artifact management,
          task control, shell access, and error throwing
    failure_modes:
      - mistake: Calling build() without createShared or finalize
        mechanism: >-
          ProcessorBuilder.build() throws a FrameworkError if either
          createShared() or finalize() was not called. The error message
          names the missing method but agents often skip one or both
          when generating a quick example.
        wrong_pattern: |
          new ProcessorBuilder({ id: 'proc', title: 'Proc' })
            .stage('s', 'Stage', (s) => s.step({ ... }))
            .build();
        correct_pattern: |
          new ProcessorBuilder({ id: 'proc', title: 'Proc' })
            .createShared(async () => ({}))
            .stage('s', 'Stage', (s) => s.step({ ... }))
            .finalize(async () => {})
            .build();
        source: modules/classes/processorBuilder.ts lines 155-163
        priority: CRITICAL
        status: active

      - mistake: Returning wrong shape from step run function
        mechanism: >-
          Every step run() must return { artifact: T }. Returning a plain
          value or forgetting the artifact wrapper causes the processor to
          store undefined as the artifact. No runtime error occurs but
          getStepArtifact() later returns undefined, causing subtle bugs.
        wrong_pattern: |
          run: async () => {
            return "result";
          }
        correct_pattern: |
          run: async () => {
            return { artifact: "result" };
          }
        source: modules/types.ts — StepRunResult interface
        priority: CRITICAL
        status: active

      - mistake: Using task.group instead of direct task() nesting
        mechanism: >-
          Tasuku v3 uses automatic nesting detection — calling task()
          inside a task callback auto-nests. Agents trained on v2 or
          other task libraries may try to use task.group() for stages,
          which does not match Stagehand's execution model and breaks
          the stage/step rendering hierarchy.
        wrong_pattern: |
          await task.group(task => [
            task('Stage A', async () => { ... }),
            task('Stage B', async () => { ... }),
          ]);
        correct_pattern: |
          for (const stage of stages) {
            await task(stage.title, async ({ setStatus }) => {
              await task('Step 1', async () => { ... });
              await task('Step 2', async () => { ... });
              setStatus('complete');
            });
          }
        source: AGENT.md — Execution Model section; modules/classes/processor.ts
        priority: HIGH
        status: active

      - mistake: Putting too much logic in a single step
        mechanism: >-
          Steps should be atomic — do exactly one thing. Combining multiple
          operations in a single step makes compensation handlers complex
          or impossible to write correctly, because partial completion
          within a step cannot be tracked or rolled back.
        wrong_pattern: |
          run: async (ctx) => {
            await ctx.$('npm', ['install']);
            await ctx.$('npm', ['run', 'build']);
            await ctx.$('cp', ['-r', 'dist/', '/deploy/']);
            return { artifact: null };
          }
        correct_pattern: |
          // Split into three separate steps:
          // Step 1: install dependencies (effect: 'create')
          // Step 2: run build (effect: 'create')
          // Step 3: deploy artifacts (effect: 'create')
        source: maintainer interview
        priority: HIGH
        status: active

      - mistake: Awaiting parallel steps individually
        mechanism: >-
          In a parallel stage, step task() calls must NOT be individually
          awaited. Awaiting them serializes execution. The processor fires
          them without await and uses Promise.allSettled internally.
        wrong_pattern: |
          s.parallel().step({
            run: async (ctx) => {
              // Inside the stage, agent writes:
              await task('Step 1', async () => { ... });
              await task('Step 2', async () => { ... });
            }
          })
        correct_pattern: |
          s.parallel()
            .step({ id: 'step-1', ..., run: async () => ({ artifact: 'r1' }) })
            .step({ id: 'step-2', ..., run: async () => ({ artifact: 'r2' }) })
        source: modules/classes/processor.ts — runParallelSteps method
        priority: MEDIUM
        status: active

      - mistake: Omitting effect kind on step definitions
        mechanism: >-
          Every step requires an effect field (read, create, update, delete,
          external). Agents may omit it since it has no runtime enforcement
          yet, but it drives compensation policy decisions and documents
          the step's intent. Omitting it defeats Stagehand's declarative
          resource model.
        source: modules/types.ts — StepDefinition interface
        priority: MEDIUM
        status: active

  - name: Compensation and Rollback
    slug: compensation-and-rollback
    domain: resilience
    description: >-
      Add compensation to steps: choosing the right CompensationPolicy,
      writing compensate() handlers, understanding reverse-order execution,
      and diagnosing what needs cleanup when a script fails at any point.
    type: core
    covers:
      - CompensationPolicy (none, best-effort, required)
      - StepEffectKind and its relationship to compensation
      - compensate() callback on StepDefinition
      - Stage-level compensate() callback
      - Reverse-order compensation execution
      - CompensationFailure tracking
      - Required vs best-effort semantics
      - Step atomicity principle
    tasks:
      - Choose the correct compensation policy for a step's effect
      - Write a compensate() handler that reverses a step's side effect
      - Diagnose what needs rollback given a failure at any point
      - Handle compensation failures gracefully
      - Structure steps to be atomic enough for clean rollback
    failure_modes:
      - mistake: Not registering errors and throwing plain Error
        mechanism: >-
          Agents throw new Error('message') instead of using
          ctx.errors.create('CODE') or ctx.fail('CODE'). This bypasses
          the typed error registry, loses the error code for downstream
          handling, and produces unstructured error output.
        wrong_pattern: |
          run: async (ctx) => {
            throw new Error('Build failed');
          }
        correct_pattern: |
          // First, register errors in the builder:
          .errors({ BUILD_FAILED: 'Build failed' })
          // Then in the step:
          run: async (ctx) => {
            ctx.fail('BUILD_FAILED');
          }
        source: maintainer interview
        priority: CRITICAL
        status: active

      - mistake: Not providing rollback for non-read effects
        mechanism: >-
          Steps with effect 'create', 'update', 'delete', or 'external'
          produce side effects that need cleanup on failure. Agents
          commonly set compensation to { kind: 'none' } for all steps
          regardless of effect, leaving the system in a dirty state
          after partial failure.
        wrong_pattern: |
          s.step({
            id: 'deploy',
            effect: 'create',
            compensation: { kind: 'none' },
            run: async (ctx) => {
              await ctx.$('cp', ['-r', 'dist/', '/deploy/']);
              return { artifact: '/deploy/' };
            },
          })
        correct_pattern: |
          s.step({
            id: 'deploy',
            effect: 'create',
            compensation: { kind: 'best-effort' },
            run: async (ctx) => {
              await ctx.$('cp', ['-r', 'dist/', '/deploy/']);
              return { artifact: '/deploy/' };
            },
            compensate: async (ctx, deployPath) => {
              await ctx.$('rm', ['-rf', deployPath]);
            },
          })
        source: maintainer interview
        priority: CRITICAL
        status: active

      - mistake: Compensation handler ignoring the artifact parameter
        mechanism: >-
          The compensate() callback receives the artifact from the step's
          run(). Agents write compensate handlers that hardcode paths or
          values instead of using the artifact, making rollback fragile
          and non-portable.
        wrong_pattern: |
          compensate: async (ctx) => {
            await ctx.$('rm', ['-rf', '/deploy/']);
          }
        correct_pattern: |
          compensate: async (ctx, artifact) => {
            await ctx.$('rm', ['-rf', artifact.deployPath]);
          }
        source: modules/classes/processor.ts — compensate method passes artifact
        priority: HIGH
        status: active

      - mistake: Missing required compensator triggers compensation failure
        mechanism: >-
          When compensation policy is { kind: 'required' } but no
          compensate() function is provided, the processor records a
          CompensationFailure with a FrameworkError. This is silent
          during execution — it only appears in the result object.
        source: modules/classes/processor.ts lines 241-248
        priority: HIGH
        status: active

  - name: Migrate from Bash
    slug: migrate-from-bash
    domain: migration
    description: >-
      Convert an existing bash script into a Stagehand processor:
      map each command to a step preserving commands 1:1, organize
      into stages, replace commands only when fs or Node/Bun APIs
      handle it better, and wire up error handling and compensation.
    type: lifecycle
    covers:
      - Mapping bash commands to steps
      - Organizing commands into logical stages
      - Preserving command fidelity (1:1 translation)
      - Using ctx.$() for shell commands
      - Replacing commands with fs/Node APIs when appropriate
      - Adding compensation for side-effecting commands
      - Translating bash conditionals to when() guards
      - Translating bash progress display to tasuku task rendering
    tasks:
      - Analyze a bash script and identify stage/step boundaries
      - Convert each bash command to a Stagehand step
      - Replace file operations with fs when appropriate
      - Add typed error handling for each failure point
      - Add compensation for non-read side effects
      - Translate bash flags/arguments to typed Commander options
    failure_modes:
      - mistake: Combining multiple bash commands into one step
        mechanism: >-
          When migrating, agents combine related bash commands (e.g.
          git pull + npm install + npm build) into a single step. This
          violates step atomicity and makes compensation impossible for
          partial completion.
        wrong_pattern: |
          s.step({
            id: 'update',
            effect: 'update',
            compensation: { kind: 'best-effort' },
            run: async (ctx) => {
              await ctx.$('git', ['pull']);
              await ctx.$('npm', ['ci']);
              await ctx.$('npm', ['run', 'build']);
              return { artifact: null };
            },
          })
        correct_pattern: |
          s.step({
            id: 'git-pull', effect: 'update', ...
            run: async (ctx) => {
              await ctx.$('git', ['pull']);
              return { artifact: 'pulled' };
            },
          })
          .step({
            id: 'npm-install', effect: 'create', ...
            run: async (ctx) => {
              await ctx.$('npm', ['ci']);
              return { artifact: 'installed' };
            },
          })
        source: maintainer interview
        priority: HIGH
        status: active

      - mistake: Rewriting shell commands unnecessarily
        mechanism: >-
          Agents replace working shell commands with Node.js equivalents
          when the bash version is perfectly adequate. The migration
          should preserve commands 1:1 using ctx.$() unless a Node/Bun
          API (like fs) genuinely handles it better.
        wrong_pattern: |
          import { execSync } from 'child_process';
          run: async () => {
            execSync('git pull');
            return { artifact: null };
          }
        correct_pattern: |
          run: async (ctx) => {
            await ctx.$('git', ['pull']);
            return { artifact: 'pulled' };
          }
        source: maintainer interview
        priority: HIGH
        status: active

      - mistake: Ignoring bash error handling patterns during migration
        mechanism: >-
          Bash scripts use || exit 1, set -e, or if/then/else for error
          handling. Agents drop these during migration instead of
          translating them into Stagehand's error registry and
          compensation model.
        source: build.bash — stage_error function and conditional checks
        priority: MEDIUM
        status: active

  - name: Theming and Output
    slug: theming-and-output
    domain: app-setup
    description: >-
      Configure ScriptTheme colors, header style, stage/step format
      strings, and collapse levels. Use ExecutionContext task controls
      for in-flight feedback during step execution.
    type: core
    covers:
      - ScriptTheme interface
      - Color functions (primary, secondary, accent, etc.)
      - HeaderStyle (simple, fancy)
      - StageStyle and StepStyle format strings
      - CollapseLevel (stage, tasks, none)
      - Collapse priority resolution (stage > flag > theme)
      - ctx.setTaskTitle(), ctx.setTaskOutput(), ctx.setTaskStatus()
      - ctx.setTaskError(), ctx.setTaskWarning()
      - TasukuReporter.printHeader()
      - Text formatting utilities (Bold, colors, GradientText)
      - DEFAULT_THEME constant
    tasks:
      - Customize the default theme with project-specific colors
      - Configure collapse behavior for clean terminal output
      - Use ctx task controls to show progress during step execution
      - Set up the header with metadata (company, author, version)
      - Choose between simple and fancy header styles
    failure_modes:
      - mistake: Passing color strings instead of color functions
        mechanism: >-
          All ScriptTheme color properties are functions with signature
          (text: string) => string. Agents assign hex strings or CSS
          color names instead of ANSI formatter functions, causing
          runtime errors when the theme tries to call them.
        wrong_pattern: |
          .theme({
            colors: {
              primary: '#0000FF',
              error: 'red',
            }
          })
        correct_pattern: |
          import { blue, red } from './modules/textFormatting';
          .theme({
            colors: {
              primary: blue,
              error: red,
            }
          })
        source: modules/types.ts — ScriptTheme colors type signatures
        priority: CRITICAL
        status: active

      - mistake: Setting gradient as functions instead of hex tuple
        mechanism: >-
          The gradient property is the ONE color property that is NOT a
          function — it is a [string, string] tuple of hex colors. Agents
          applying the "colors are functions" rule uniformly will try to
          make gradient a function too.
        wrong_pattern: |
          colors: {
            gradient: (text) => GradientText(text, '#00FFFF', '#FF00FF'),
          }
        correct_pattern: |
          colors: {
            gradient: ['#00FFFF', '#FF00FF'],
          }
        source: modules/types.ts — gradient property type is [string, string]
        priority: HIGH
        status: active

      - mistake: Calling tasuku task API outside of step context
        mechanism: >-
          ctx.setTaskTitle(), ctx.setTaskOutput() etc. delegate to the
          bound TaskInnerAPI. When called on a context without a bound
          task (e.g. in createShared or finalize), they either no-op or
          fall back to runtime.log. Agents may expect them to always
          render in the terminal.
        source: modules/classes/executionContext.ts — task property initialization
        priority: MEDIUM
        status: active

tensions:
  - name: Step atomicity vs. implementation convenience
    skills: ['define-processor', 'compensation-and-rollback']
    description: >-
      Making steps maximally atomic (one operation each) produces clean
      compensation but increases boilerplate and stage/step count.
      Combining operations is more convenient but makes rollback
      fragile or impossible.
    implication: >-
      Agents optimize for fewer steps to reduce code, producing steps
      that do 2-3 things. This makes the compensate() handler either
      impossible to write correctly or a source of partial-rollback bugs.

  - name: Command fidelity vs. idiomatic Node
    skills: ['migrate-from-bash', 'define-processor']
    description: >-
      Migration should preserve bash commands 1:1, but some operations
      (file existence checks, directory creation, file copying) are
      better handled by Node/Bun fs APIs. The tension is knowing when
      to translate vs. when to preserve.
    implication: >-
      Agents either rewrite everything into Node.js (losing fidelity
      and introducing bugs from reimplementation) or preserve everything
      as ctx.$() calls (missing opportunities where fs is genuinely
      better).

  - name: Type strictness vs. quick prototyping
    skills: ['scaffold-cli-app', 'define-processor']
    description: >-
      Stagehand enforces type correctness on flags, errors, artifacts,
      and the builder chain. This is valuable in production but adds
      friction when quickly prototyping a script.
    implication: >-
      Agents skip the errors() call, use 'any' for artifacts, or
      cast types to avoid compiler errors, defeating the framework's
      safety guarantees.

